<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #f5f4ef;
      --surface-border: rgba(16, 24, 40, 0.08);
      --ink: #111827;
      --muted: #5b6472;
      --muted-soft: #7b8494;
      --accent: #0f9f7a;
      --danger: #b42318;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --radius-xl: 24px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 352px;
      margin: 0;
      padding: 18px;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(15, 159, 122, 0.18), transparent 28%),
        linear-gradient(180deg, #faf9f4 0%, var(--bg) 100%);
      font-family: "Geist", "Avenir Next", "Segoe UI Variable", "Hiragino Sans", "Noto Sans JP", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--surface-border);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(15, 159, 122, 0.08), transparent 44%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.5), transparent 60%);
      pointer-events: none;
    }

    .header,
    .hero,
    .maintenance-notice,
    .footer-actions,
    .footer-links {
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .brand-top {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.15;
      letter-spacing: -0.03em;
      font-weight: 800;
      color: var(--ink);
      white-space: nowrap;
    }

    .app-version {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.05);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .maintenance-notice {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: #fff2cc;
      color: #7a4b00;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }

    .maintenance-notice a {
      color: inherit;
    }

    .hero {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hero-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hero-title {
      margin: 0;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.35;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-wrap: pretty;
    }

    .hero-copy {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      text-wrap: pretty;
    }

    .action-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 18px 0 12px;
    }

    .btn-primary,
    .btn-primary-skeleton {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      padding: 12px 16px;
      border-radius: 17px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-decoration: none;
      transition: transform 0.16s ease, background-color 0.16s ease, border-color 0.16s ease;
    }

    .btn-primary {
      border: 1px solid rgba(15, 159, 122, 0.22);
      background: rgba(15, 159, 122, 0.10);
      color: #0c7c60;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: rgba(15, 159, 122, 0.14);
      border-color: rgba(15, 159, 122, 0.30);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary-skeleton {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(148, 163, 184, 0.14);
      color: transparent;
    }

    .btn-primary-skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.55), transparent);
      animation: shimmer 1.2s ease-in-out infinite;
    }

    .support-copy {
      margin: 0;
      min-height: 1.5rem;
      padding: 0 2px;
      color: var(--muted-soft);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
      text-wrap: pretty;
    }

    .footer-actions {
      display: flex;
      justify-content: center;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(17, 24, 39, 0.08);
    }

    .btn-reset {
      border: none;
      background: none;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 14px;
      padding-bottom: 2px;
    }

    .f-link {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-decoration: none;
    }

    .f-link:hover,
    .btn-reset:hover {
      text-decoration: underline;
    }

    .is-hidden {
      display: none !important;
    }

    .is-loading .support-copy {
      display: none;
    }

    @keyframes shimmer {
      100% {
        transform: translateX(100%);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="brand">
        <div class="brand-top">
          <h1 data-i18n="name">VoiceMux Bridge</h1>
          <span id="version-display" class="app-version">v...</span>
        </div>
      </div>
    </div>

    <div id="maintenance-notice" class="maintenance-notice">
      <a id="maintenance-link" href="#" target="_blank">Maintenance</a>
    </div>

    <div id="content-view" class="hero is-loading">
      <section class="hero-panel">
        <h2 id="content-title" class="hero-title"></h2>
        <p id="content-copy" class="hero-copy"></p>
      </section>

      <div class="action-stack">
        <button id="primary-action" class="btn-primary is-hidden" type="button"></button>
        <div id="primary-action-skeleton" class="btn-primary-skeleton" aria-hidden="true">Loading...</div>
        <p id="primary-note" class="support-copy">&nbsp;</p>
      </div>
    </div>

    <div class="footer-actions">
      <button id="btn-global-reset" class="btn-reset is-hidden" data-i18n="btn_reset_connection">Reset Room</button>
    </div>

    <div class="footer-links">
      <a href="https://github.com/Kaneta/voicemux-bridge/issues" target="_blank" class="f-link" data-i18n="link_support">Support</a>
      <a href="https://knc.jp/ja/docs/voicemux-bridge/" id="guide-link" target="_blank" class="f-link" data-i18n="link_guide">Guide</a>
      <a href="https://github.com/Kaneta/voicemux-bridge/blob/main/PRIVACY.md" target="_blank" class="f-link" data-i18n="link_privacy">Privacy</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
